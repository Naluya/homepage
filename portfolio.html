<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Vergrößert">
</div>

<script>
    let currentImgIndex = 0;
    let allImages = [];

    function openLightbox(element) {
        allImages = Array.from(document.querySelectorAll('.portfolio-item img')).map(img => img.dataset.originalSrc || img.src);
        
        const imgElement = element.querySelector('img');
        const imgSrc = imgElement.dataset.originalSrc || imgElement.src;
        
        currentImgIndex = allImages.indexOf(imgSrc);
        
        updateLightboxImage();
        document.getElementById('lightbox').style.display = 'flex';
    }

    function updateLightboxImage() {
        document.getElementById('lightbox-img').src = allImages[currentImgIndex];
    }

    function changeImage(direction) {
        let newIndex = currentImgIndex + direction;
        
        if (newIndex >= 0 && newIndex < allImages.length) {
            currentImgIndex = newIndex;
            updateLightboxImage();
        }
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    window.addEventListener('keydown', (event) => {
        const lightbox = document.getElementById('lightbox');
        if (lightbox.style.display === 'flex') {
            if (event.key === 'ArrowRight') {
                changeImage(1);
            } else if (event.key === 'ArrowLeft') {
                changeImage(-1);
            } else if (event.key === 'Escape') {
                closeLightbox();
            }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        const items = document.querySelectorAll('.portfolio-item');
        
        items.forEach(item => {
            const img = item.querySelector('img');
            const customThumb = img.getAttribute('data-thumb');
            const originalSrc = img.src; 
            
            img.dataset.originalSrc = originalSrc;
            
            if (customThumb) {
                img.src = customThumb; 
            }

            const tempImg = new Image();
            tempImg.src = originalSrc;
            tempImg.onload = function() {
                const ratio = tempImg.width / tempImg.height;
                if (ratio > 1) {
                    let extraWidth = 1 + (ratio - 1) * 0.1; 
                    if (extraWidth > 1.2) extraWidth = 1.2; 
                    item.style.flexGrow = extraWidth;
                    item.style.flexBasis = `calc(${220 * extraWidth}px)`;
                }
            tempImg.onerror = function() { console.log("Bild konnte nicht geladen werden" + originalSrc); };
            };
        });
    });
</script>
