<html lang="de">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-body">

    <aside>
        <h2>Menü</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="contact.html">About</a></li>
        </ul>
    </aside>

<main>
    <div class="portfolio-grid">

        <div class="portfolio-item" onclick="openLightbox(this)">
            <img src="Helixel (1).png" alt="Beschreibung">
        </div>

        <div class="portfolio-item" onclick="openLightbox(this)">
            <img src="nik fire-protected-intensity-LOW-V2-nightshade-intensity-LOW-V1.png" alt="Beschreibung">
        </div>

        <div class="portfolio-item" onclick="openLightbox(this)">
            <img src="chib yu-protected-intensity-LOW-V2.png" alt="Beschreibung">
        </div>

                
        <div class="portfolio-item" onclick="openLightbox(this)">
            <img src="bild1.jpg" data-thumb="bild1-auschnitt.jpg" alt="Bild 1" onerror="this.src='https://via.placeholder.com/400x300'">
        </div>

    </div>
</main>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Vergrößert">
</div>
            


    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Vergrößert">
    </div>

   <script>
    function openLightbox(element) {
        var imgElement = element.querySelector('img');
        var imgSrc = imgElement.src; 
        document.getElementById('lightbox-img').src = imgSrc;
        document.getElementById('lightbox').style.display = 'flex';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const items = document.querySelectorAll('.portfolio-item');
        
        items.forEach(item => {
            const img = item.querySelector('img');
            
            const customThumb = img.getAttribute('data-thumb');
            const originalSrc = img.src; 
            
            if (customThumb) {
                img.src = customThumb; 
            }

            const tempImg = new Image();
            tempImg.src = originalSrc;
            tempImg.onload = function() {
                const ratio = tempImg.width / tempImg.height;
                
                if (ratio > 1) {
                    let extraWidth = 1 + (ratio - 1) * 0.1; 
                    if (extraWidth > 1.2) extraWidth = 1.2; 
                    
                    item.style.flexGrow = extraWidth;
                    item.style.flexBasis = `calc(${220 * extraWidth}px)`;
                }
            };
        });
    });
</script>

</body>
</html>
